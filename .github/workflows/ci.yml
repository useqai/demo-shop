name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Frontend: install, build ──────────────────────────────────────────────────
  frontend:
    name: Frontend (Vite build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  # ── Node.js backend services: install + test ──────────────────────────────────
  node-services:
    name: Node services (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [product-catalog-svc, cart-svc, payment-svc]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json
      - run: npm install
        working-directory: ${{ matrix.service }}
      - run: npm test --if-present
        working-directory: ${{ matrix.service }}

  # ── Java checkout-svc: Maven build + test ─────────────────────────────────────
  checkout-svc:
    name: checkout-svc (Java 17 / Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven
      - name: Build
        run: mvn -q package -DskipTests
        working-directory: checkout-svc
        
# ── SEALIGHTS START ─────────────────────────────────────
      - name: Download SeaLights Agent
        run: |
          curl -s -o sealights-java-latest.zip https://agents.sealights.co/sealights-java/sealights-java-latest.zip
          unzip -oq sealights-java-latest.zip -d ./sealights
          rm sealights-java-latest.zip
          
      - name: Decode SEALIGHTS_TOKEN
        run: echo "${{ secrets.SEALIGHTS_TOKEN }}"

      - name: Decrypt SEALIGHTS_TOKEN
        id: decrypt-sealights-token
        run: |
          export SEALIGHTS_TOKEN_DECRYPTED=$(echo "${{ secrets.SEALIGHTS_TOKEN }}")
          echo "value=$SEALIGHTS_TOKEN_DECRYPTED" >> $GITHUB_OUTPUT
          echo "$SEALIGHTS_TOKEN_DECRYPTED" > sltoken.txt

      - name: "SeaLights: Configure"
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          java -jar ./sealights/sl-build-scanner.jar -config \
            -tokenfile sltoken.txt \
            -appname "demo-shop-checkout-svs-java" \
            -branchname "${{ github.ref_name }}" \
            -buildname "$(date +%s)" \
            -pi "*com.demoshop.*" 
           
      - name: "SeaLights: Scan"
        run: |
          java -jar ./sealights/sl-build-scanner.jar -scan \
            -tokenfile sltoken.txt \
            -buildsessionidfile buildSessionId.txt \
            -workspacepath "./checkout-svc/target" \
            -fi "*.class" \
            -r
            
      - name: "SeaLights: Finish Reporting"
        run: |
         java -jar ./sealights/sl-build-scanner.jar -buildend -ok \
              -tokenfile sltoken.txt \
              -buildsessionidfile buildSessionId.txt

      - name: "SeaLights: Start Test Listener"
        run: |
          java -jar ./sealights/sl-build-scanner.jar start \
            -tokenfile sltoken.txt \
            -buildsessionidfile buildSessionId.txt \
            -testStage "Playwright Regression"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: e2e

      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: true
        working-directory: e2e
        env:
          CI: true

      - name: "SeaLights: End Test Listener"
        run: |
          java -jar ./sealights/sl-build-scanner.jar end \
            -tokenfile sltoken.txt \
            -buildsessionidfile buildSessionId.txt
      
# ── SEALIGHTS END ─────────────────────────────────────

      - name: Test
        run: mvn test
        working-directory: checkout-svc
        continue-on-error: true

  # ── Docker build check for checkout-svc ──────────────────────────────────────
  checkout-docker:
    name: checkout-svc Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: checkout-svc
          push: false
