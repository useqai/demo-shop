name: QAI Test Intelligence

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: e2e

      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: true
        working-directory: e2e
        env:
          CI: true

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: e2e/test-results/results.xml
          retention-days: 30

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: e2e/test-results/**/*.png
          retention-days: 30

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: e2e/test-results/**/*.zip
          retention-days: 30

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30

      - name: QAI Agent
        uses: useqai/qai-agent@v1
        if: always()
        with:
          junit-path: 'e2e/test-results/results.xml'
          trace-path: 'e2e/test-results/**/*.zip'
          playwright-report: 'e2e/test-results/report.json'
          fail-on-high-risk: 'false'
          qai-url: https://ingest.useqai.dev
          qai-api-key: ${{ secrets.QAI_API_KEY_TEST }}
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
